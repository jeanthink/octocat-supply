name: Test deployed app and report to Azure DevOps

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Deployed API URL (overrides repo variable)'
        required: false
        default: ''
      frontend_url:
        description: 'Deployed frontend URL (overrides repo variable)'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'frontend/**'
      - 'infra/**'
      - '.github/workflows/test-and-report-to-ado.yml'
  schedule:
    - cron: '0 7 * * *'   # daily 07:00 UTC

permissions:
  contents: read

jobs:
  resolve-urls:
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.resolve.outputs.api_url }}
      frontend_url: ${{ steps.resolve.outputs.frontend_url }}
    steps:
      - id: resolve
        shell: bash
        run: |
          API="${{ inputs.api_url }}"
          FE="${{ inputs.frontend_url }}"
          if [ -z "$API" ]; then API="${{ vars.API_URL }}"; fi
          if [ -z "$FE" ];  then FE="${{ vars.FRONTEND_URL }}"; fi
          if [ -z "$API" ]; then API="https://demo-api-ca.bluecliff-042062ba.australiaeast.azurecontainerapps.io"; fi
          if [ -z "$FE" ];  then FE="https://demo-frt-ca.bluecliff-042062ba.australiaeast.azurecontainerapps.io"; fi
          echo "api_url=$API"      >> $GITHUB_OUTPUT
          echo "frontend_url=$FE" >> $GITHUB_OUTPUT
          echo "Using API=$API"
          echo "Using FE=$FE"

  api-tests:
    needs: resolve-urls
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: api } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm', cache-dependency-path: api/package-lock.json }
      - run: npm ci
      - name: Vitest with JUnit reporter
        run: npx vitest run --reporter=junit --outputFile=../junit-api.xml || true
      - uses: actions/upload-artifact@v4
        with:
          name: junit-api
          path: junit-api.xml
          if-no-files-found: warn

  e2e-tests:
    needs: resolve-urls
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    env:
      PLAYWRIGHT_BASE_URL: ${{ needs.resolve-urls.outputs.frontend_url }}
      PLAYWRIGHT_WEB_SERVER: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run Playwright (junit reporter)
        run: npx playwright test --project=chromium --reporter=junit > ../junit-e2e.xml || true
      - uses: actions/upload-artifact@v4
        with:
          name: junit-e2e
          path: junit-e2e.xml
          if-no-files-found: warn

  report-to-ado:
    needs: [resolve-urls, api-tests, e2e-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: junit }
      - name: Post results to Azure DevOps
        shell: pwsh
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
        run: |
          ./scripts/post-tests-to-ado.ps1 `
            -ApiUrl '${{ needs.resolve-urls.outputs.api_url }}' `
            -FrontendUrl '${{ needs.resolve-urls.outputs.frontend_url }}' `
            -JunitDir junit
