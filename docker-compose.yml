version: "3.8"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PYTHON_ENV=production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - api
    environment:
      - API_HOST=localhost
      - API_PORT=3000
      - API_PROTOCOL=http
      - NGINX_API_HOST=api
      - NGINX_API_PORT=3000
